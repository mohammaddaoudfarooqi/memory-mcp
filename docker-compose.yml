services:
  memory-mcp:
    build: .
    image: memory-mcp:latest
    env_file: .env
    ports:
      - "8000:8000"
    networks:
      - memory-mcp-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "python", "-c", "import http.client,json; c = http.client.HTTPConnection('localhost', 8000, timeout=5); c.request('POST', '/mcp', json.dumps({'jsonrpc':'2.0','id':0,'method':'initialize','params':{'protocolVersion':'2025-03-26','capabilities':{},'clientInfo':{'name':'healthcheck','version':'1.0'}}}), {'Content-Type':'application/json','Accept':'application/json, text/event-stream'}); assert c.getresponse().status == 200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  memory-mcp-network:
    driver: bridge
